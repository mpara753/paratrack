<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARATRACK 3D — Motor Paraglider Flight Viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%AA%82</text></svg>">

<link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
* { margin:0; padding:0; }
html,body,#cesiumContainer { width:100%; height:100%; overflow:hidden; }
body { background:#07101e; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:#d4e8f5; }

.panel {
  position:absolute; z-index:10;
  background:rgba(8,16,32,0.92); border:1px solid rgba(255,255,255,0.12);
  border-radius:11px; backdrop-filter:blur(16px); color:#d4e8f5;
}
#header { top:12px; left:12px; right:12px; display:flex; align-items:center; gap:12px; padding:9px 16px; }
.logo { font-size:22px; }
.app-name { font-size:16px; font-weight:700; color:#f5c842; letter-spacing:.06em; }
.app-sub  { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.13em; margin-top:1px; }
#hstats { display:none; gap:14px; margin-left:auto; }
.hs .v { font-size:14px; font-weight:700; color:#f5c842; font-variant-numeric:tabular-nums; }
.hs .l { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.07em; }

#side { position:absolute; z-index:10; left:12px; top:68px; bottom:12px; width:248px; display:flex; flex-direction:column; gap:8px; }
.card { background:rgba(8,16,32,0.92); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:12px 14px; backdrop-filter:blur(16px); flex-shrink:0; }
.card-grow { flex:1; min-height:0; display:flex; flex-direction:column; }
.sec { font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:#5a7fa0; margin-bottom:9px; display:flex; align-items:center; gap:5px; }
.sec::before { content:''; width:9px; height:1px; background:#f5c842; display:block; flex-shrink:0; }
.lbtns { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.lbtn { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10); border-radius:6px; padding:7px 4px; color:#d4e8f5; font-size:10px; cursor:pointer; text-align:center; transition:all .14s; font-family:inherit; }
.lbtn:hover { border-color:#f5c842; color:#f5c842; }
.lbtn.on    { background:rgba(245,200,66,.18); border-color:#f5c842; color:#f5c842; }
.prow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.pbtn { width:38px; height:38px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,#f59b1a,#f5c842); border:none; color:#07101e; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .1s; }
.pbtn:hover { transform:scale(1.08); }
.ssel { flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:6px; color:#d4e8f5; font-size:11px; padding:6px 7px; outline:none; cursor:pointer; font-family:inherit; }
.ssel option { background:#07101e; }
.pbar { width:100%; height:6px; background:rgba(255,255,255,.10); border-radius:3px; overflow:hidden; cursor:pointer; margin-bottom:5px; }
.pfill { height:100%; width:0%; background:linear-gradient(90deg,#00d4ff,#f5c842); border-radius:3px; }
.trow { display:flex; justify-content:space-between; font-size:10px; color:#5a7fa0; }
.tval { color:#d4e8f5; font-size:12px; font-variant-numeric:tabular-nums; }
.sg { margin-bottom:8px; }
.sr { display:flex; justify-content:space-between; margin-bottom:3px; }
.sl { font-size:10px; color:#5a7fa0; }
.sv { font-size:10px; color:#f5c842; font-weight:600; }
input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:rgba(255,255,255,.12); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#f5c842; }
.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.sbox { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:7px; padding:8px 10px; }
.sbox .bv { font-size:15px; font-weight:700; color:#f5c842; line-height:1; font-variant-numeric:tabular-nums; }
.sbox .bl { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
#altCvs { width:100%; flex:1; display:block; cursor:crosshair; min-height:40px; }
.legrow { display:flex; align-items:center; gap:5px; margin-top:5px; flex-shrink:0; }
.legbar { flex:1; height:3px; border-radius:2px; background:linear-gradient(90deg,#00d4ff,#ff6b35); }
.legl { font-size:9px; color:#5a7fa0; }
.newbtn { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:6px; color:#5a7fa0; font-size:10px; padding:7px; cursor:pointer; margin-top:7px; font-family:inherit; flex-shrink:0; transition:all .14s; }
.newbtn:hover { color:#f5c842; border-color:#f5c842; }

#rc { position:absolute; z-index:10; right:12px; top:68px; display:flex; flex-direction:column; gap:7px; }
.cbtn { width:40px; height:40px; border-radius:9px; background:rgba(8,16,32,.92); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); color:#d4e8f5; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .14s; }
.cbtn:hover,.cbtn.on { border-color:#f5c842; color:#f5c842; background:rgba(245,200,66,.15); }

#hud { position:absolute; z-index:10; bottom:12px; left:272px; right:58px; display:none; align-items:center; gap:10px; padding:7px 14px; }
.hl { font-size:9px; color:#5a7fa0; }
.hv { font-size:13px; font-weight:700; color:#f5c842; min-width:60px; font-variant-numeric:tabular-nums; }

#ov { position:absolute; inset:0; z-index:20; background:radial-gradient(ellipse at 50% 38%,#122040 0%,#060e1b 100%); display:flex; align-items:center; justify-content:center; padding:20px; transition:opacity .4s; }
.ucard { background:rgba(9,18,36,.96); border:1.5px dashed rgba(245,200,66,.28); border-radius:18px; padding:44px 52px; text-align:center; max-width:460px; width:100%; }
.ucard.drag { border-color:#f5c842; }
.uico   { font-size:52px; margin-bottom:14px; }
.utitle { font-size:22px; font-weight:700; color:#f5c842; margin-bottom:8px; letter-spacing:.05em; }
.udesc  { font-size:12px; color:#5a7fa0; line-height:1.7; margin-bottom:22px; }
.ubtn { width:100%; background:linear-gradient(135deg,#f59b1a,#f5c842); color:#07101e; border:none; border-radius:9px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; margin-bottom:10px; font-family:inherit; }
.ubtn:hover { filter:brightness(1.08); }
.dbtn { width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:9px; color:#d4e8f5; font-size:12px; padding:11px; cursor:pointer; font-family:inherit; transition:all .14s; }
.dbtn:hover { border-color:#f5c842; color:#f5c842; }
#fi { display:none; }
</style>

<body>

<div id="cesiumContainer"></div>

<div id="ov">
  <div class="ucard" id="dz">
    <div class="uico">🪂</div>
    <div class="utitle">PARATRACK 3D</div>
    <div class="udesc">IGC / GPX ファイルをドロップ、または選択して<br>3D衛星地図に飛行軌跡を表示します</div>
    <button class="ubtn" onclick="document.getElementById('fi').click()">📂 GPSログを選択</button>
    <input type="file" id="fi" accept=".igc,.idc,.gpx,.txt">
    <button class="dbtn" onclick="loadDemo()">🛫 デモフライト（富士山周辺）で試す</button>
  </div>
</div>

<div class="panel" id="header">
  <div class="logo">🪂</div>
  <div><div class="app-name">PARATRACK 3D</div><div class="app-sub">Motor Paraglider Flight Viewer</div></div>
  <div id="hstats">
    <div class="hs"><div class="v" id="hA">—</div><div class="l">最高高度 m</div></div>
    <div class="hs"><div class="v" id="hD">—</div><div class="l">飛行距離 km</div></div>
    <div class="hs"><div class="v" id="hT">—</div><div class="l">飛行時間</div></div>
  </div>
</div>

<div id="side">
  <div class="card">
    <div class="sec">地図レイヤー</div>
    <div class="lbtns">
      <button class="lbtn on" id="lb-sat" onclick="setLayer('sat')">🛰 衛星写真</button>
      <button class="lbtn"    id="lb-osm" onclick="setLayer('osm')">🗺 地図</button>
    </div>
  </div>
  <div class="card">
    <div class="sec">フライバック再生</div>
    <div class="prow">
      <button class="pbtn" id="playBtn" onclick="togglePlay()">▶</button>
      <select class="ssel" id="speedSel">
        <option value="1">× 1</option>
        <option value="5">× 5</option>
        <option value="10" selected>× 10</option>
        <option value="30">× 30</option>
        <option value="60">× 60</option>
        <option value="120">× 120</option>

    </div>
    <div class="pbar" id="pbar"><div class="pfill" id="pf"></div></div>
    <div class="trow">
      <span class="tval" id="cT">00:00:00</span>
      <span class="tval" id="tT">00:00:00</span>
    </div>
  </div>
  <div class="card">
    <div class="sec">表示設定</div>
    <div class="sg">
      <div class="sr"><span class="sl">軌跡の太さ</span><span class="sv" id="wvl">3px</span></div>
      <input type="range" min="1" max="12" value="3" oninput="setWidth(+this.value)">
    </div>
  </div>
  <div class="card">

    <div id="stc" style="font-size:11px;color:#5a7fa0;text-align:center;padding:4px 0">ファイルを読み込むと表示されます</div>
  </div>
  <div class="card card-grow">
    <div class="sec">高度グラフ</div>
    <canvas id="altCvs"></canvas>
    <div class="legrow">
      <div style="flex:1;height:6px;border-radius:3px;background:linear-gradient(90deg,#ff0033,#ff6600,#ffcc00,#66ff00,#00ff00,#00ffcc,#00ffff,#0066ff,#0000ff,#9900ff,#ff00cc)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:3px;">
      <span class="legl">出発</span><span class="legl">→ 経過時間 →</span><span class="legl">到着</span>
    </div>
    <button class="newbtn" onclick="resetFlight()">↩ 別のフライトを読み込む</button>
  </div>
</div>

<div id="rc">
  <button class="cbtn on" id="b3d"  onclick="toggle3D()"    title="3D/2D">3D</button>
  <button class="cbtn"    id="bFol" onclick="toggleFollow()" title="機体追従">🎯</button>
  <button class="cbtn"              onclick="fitAll()"        title="全体表示">⛶</button>
</div>

<div class="panel" id="hud">
  <span class="hl">高度</span><span class="hv" id="bAlt">—</span>
  <span class="hl">|</span>
  <span class="hl">速度</span><span class="hv" id="bSpd">—</span>
  <span class="hl">|</span>
  <span class="hl">上昇率</span><span class="hv" id="bVar">—</span>
</div>

<script>
// ── Cesium（test_cesium.html と同じ初期化）
Cesium.Ion.defaultAccessToken = '';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  baseLayerPicker:false, geocoder:false, homeButton:false,
  sceneModePicker:false, navigationHelpButton:false,
  animation:false, timeline:false, fullscreenButton:false,
  infoBox:false, selectionIndicator:false,
});

viewer.imageryLayers.removeAll();
viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
  url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  maximumLevel: 19,
  credit: new Cesium.Credit('Tiles &copy; Esri', false),
}));

viewer.scene.fog.enabled = true;
viewer.scene.fog.density = 0.0002;
viewer.scene.skyAtmosphere.show = true;

// ズーム・移動時にもアイコンサイズを即時更新
// 追従中にユーザーがドラッグした場合もheading/pitchを記憶
viewer.camera.changed.addEventListener(() => {
  if(aircraftEntity && pts.length) {
    const camHeight = viewer.camera.positionCartographic.height;
    const minH=500, maxH=200000, minS=0.6, maxS=0.08;
    const t = Math.max(0, Math.min(1, (Math.log(camHeight) - Math.log(minH)) / (Math.log(maxH) - Math.log(minH))));
    aircraftEntity.billboard.scale = minS + (maxS - minS) * t;
  }
  // 常にheading/pitchを記憶（追従中のドラッグも反映）
  followHeading = viewer.camera.heading;
  followPitch   = viewer.camera.pitch;
});

// ── ユーティリティ
function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  return [Math.floor(sec/3600), Math.floor((sec%3600)/60), sec%60]
    .map(v => String(v).padStart(2,'0')).join(':');
}
function haversineKm(la1,lo1,la2,lo2) {
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function totalDist(pts) {
  let d=0;
  for(let i=1;i<pts.length;i++) d+=haversineKm(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
  return d;
}
// 経過時間（秒）で20色に色分け（虹色グラデーション）
const TRAIL_COLORS = [
  new Cesium.Color(1.0, 0.0, 0.2, 1.0),  //  1 赤
  new Cesium.Color(1.0, 0.2, 0.0, 1.0),  //  2 赤橙
  new Cesium.Color(1.0, 0.4, 0.0, 1.0),  //  3 橙
  new Cesium.Color(1.0, 0.6, 0.0, 1.0),  //  4 橙黄
  new Cesium.Color(1.0, 0.8, 0.0, 1.0),  //  5 黄橙
  new Cesium.Color(1.0, 1.0, 0.0, 1.0),  //  6 黄
  new Cesium.Color(0.7, 1.0, 0.0, 1.0),  //  7 黄緑
  new Cesium.Color(0.4, 1.0, 0.0, 1.0),  //  8 黄緑
  new Cesium.Color(0.0, 1.0, 0.0, 1.0),  //  9 緑
  new Cesium.Color(0.0, 1.0, 0.4, 1.0),  // 10 緑シアン
  new Cesium.Color(0.0, 1.0, 0.7, 1.0),  // 11 シアン緑
  new Cesium.Color(0.0, 1.0, 1.0, 1.0),  // 12 シアン
  new Cesium.Color(0.0, 0.7, 1.0, 1.0),  // 13 シアン青
  new Cesium.Color(0.0, 0.4, 1.0, 1.0),  // 14 青シアン
  new Cesium.Color(0.0, 0.0, 1.0, 1.0),  // 15 青
  new Cesium.Color(0.3, 0.0, 1.0, 1.0),  // 16 青紫
  new Cesium.Color(0.6, 0.0, 1.0, 1.0),  // 17 紫青
  new Cesium.Color(0.8, 0.0, 1.0, 1.0),  // 18 紫
  new Cesium.Color(1.0, 0.0, 0.8, 1.0),  // 19 紫赤
  new Cesium.Color(1.0, 0.0, 0.5, 1.0),  // 20 赤紫
];

function timeColor(ptIndex) {
  const startTime = pts[0].time;
  const totalTime = pts[pts.length-1].time - startTime;
  const elapsed   = pts[ptIndex].time - startTime;
  const t = elapsed / Math.max(1, totalTime);          // 0.0〜1.0
  const colorIdx = Math.min(Math.floor(t * 20), 19);  // 0〜19
  return TRAIL_COLORS[colorIdx];
}

// ── パーサー
function parseIGC(txt) {
  const pts=[];
  for(const line of txt.split(/\r?\n/)) {
    if(line[0]!=='B'||line.length<35) continue;
    const hh=+line.slice(1,3),mm=+line.slice(3,5),ss=+line.slice(5,7);
    const latD=+line.slice(7,9),latM=(+line.slice(9,11)+ +line.slice(11,14)/1000)/60;
    const lonD=+line.slice(15,18),lonM=(+line.slice(18,20)+ +line.slice(20,23)/1000)/60;
    let lat=latD+latM; if(line[14]==='S') lat=-lat;
    let lon=lonD+lonM; if(line[23]==='W') lon=-lon;
    const altG=+line.slice(30,35),altB=+line.slice(25,30);
    if(lat||lon) pts.push({lat,lon,alt:altG>0?altG:altB,time:hh*3600+mm*60+ss});
  }
  return pts;
}
function parseGPX(txt) {
  const pts=[];
  for(const m of txt.matchAll(/<trkpt\s+lat="([^"]+)"\s+lon="([^"]+)"[^>]*>([\s\S]*?)<\/trkpt>/g)) {
    const em=m[3].match(/<ele>([^<]+)/),tm=m[3].match(/<time>([^<]+)/);
    let time=0;
    if(tm){const d=new Date(tm[1]);time=d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
    pts.push({lat:+m[1],lon:+m[2],alt:em?+em[1]:0,time});
  }
  return pts;
}
function parseAuto(txt,name) {
  if(/\.gpx$/i.test(name)) return parseGPX(txt);
  const r=parseIGC(txt);
  return r.length>5?r:parseGPX(txt);
}
function generateDemo() {
  const pts=[],bLat=35.3606,bLon=138.7274;
  for(let i=0;i<=800;i++){
    const t=i/800,ang=t*5.5*Math.PI*2,r=0.014*(0.2+t*0.8);
    pts.push({lat:bLat+r*Math.sin(ang)+t*0.007,lon:bLon+r*Math.cos(ang)+t*0.009,
      alt:800+1100*Math.sin(t*Math.PI)+40*Math.sin(t*28)+Math.random()*18,time:i*4});
  }
  return pts;
}

// ── 状態
let pts=[],bnds=null,playhead=0,playing=false,rafId=null,prevTs=null;
let zScale=1,trailW=3,is3D=true,followMode=false,frameCount=0;
let followDistance=8000;
let followHeading=0, followPitch=Cesium.Math.toRadians(-35);
function totalDur(){return pts.length<2?1:Math.max(1,pts[pts.length-1].time-pts[0].time);}
function headIdx(){return Math.min(Math.floor(playhead*(pts.length-1)),pts.length-1);}

// ── 地図レイヤー切替
function setLayer(id) {
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('lb-'+id).classList.add('on');
  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
    url: id==='sat'
      ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      : 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    maximumLevel:19,
    credit:new Cesium.Credit(id==='sat'?'Tiles &copy; Esri':'&copy; OpenStreetMap',false),
  }));
}

// ── エンティティ
let trailEntities=[],markerStart=null,markerEnd=null,aircraftEntity=null;
let tailEntity=null;  // 直近数秒の軌跡（白色）
const TAIL_SEC = 8;   // テールの長さ（秒）

function clearEntities() {
  trailEntities.forEach(e=>viewer.entities.remove(e)); trailEntities=[];
  if(markerStart){viewer.entities.remove(markerStart);markerStart=null;}
  if(markerEnd){viewer.entities.remove(markerEnd);markerEnd=null;}
  if(aircraftEntity){viewer.entities.remove(aircraftEntity);aircraftEntity=null;}
  if(tailEntity){viewer.entities.remove(tailEntity);tailEntity=null;}
}
const ICON='data:image/svg+xml,'+encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="100" viewBox="-60 -40 120 100">'
  +'<defs><clipPath id="cp"><path d="M-55,0 Q-42,-34 0,-40 Q42,-34 55,0 Q42,-14 0,-20 Q-42,-14 -55,0 Z"/></clipPath></defs>'
  +'<path d="M-55,0 Q-42,-34 0,-40 Q42,-34 55,0 Q42,-14 0,-20 Q-42,-14 -55,0 Z" fill="#ee22aa"/>'
  +'<g clip-path="url(#cp)">'
  +'<rect x="-55" y="-42" width="16" height="44" fill="#ff2222"/>'
  +'<rect x="-39" y="-42" width="16" height="44" fill="#ff8800"/>'
  +'<rect x="-23" y="-42" width="16" height="44" fill="#ffdd00"/>'
  +'<rect x="-7"  y="-42" width="16" height="44" fill="#33cc33"/>'
  +'<rect x="9"   y="-42" width="16" height="44" fill="#2288ff"/>'
  +'<rect x="25"  y="-42" width="16" height="44" fill="#7722cc"/>'
  +'<rect x="41"  y="-42" width="16" height="44" fill="#ee22aa"/>'
  +'</g>'
  +'<path d="M-55,0 Q-42,-34 0,-40 Q42,-34 55,0" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>'
  +'<path d="M-55,0 Q-42,-14 0,-20 Q42,-14 55,0" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>'
  +'<line x1="-47" y1="-11" x2="0" y2="38" stroke="#ff2222" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="-31" y1="-15" x2="0" y2="38" stroke="#ff8800" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="-15" y1="-17" x2="0" y2="38" stroke="#ffdd00" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="1"   y1="-18" x2="0" y2="38" stroke="#33cc33" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="17"  y1="-17" x2="0" y2="38" stroke="#2288ff" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="33"  y1="-15" x2="0" y2="38" stroke="#7722cc" stroke-width="1.1" opacity="0.9"/>'
  +'<line x1="47"  y1="-11" x2="0" y2="38" stroke="#ee22aa" stroke-width="1.1" opacity="0.9"/>'
  +'<ellipse cx="0" cy="44" rx="8" ry="5" fill="#333"/>'
  +'<circle cx="0" cy="34" r="5" fill="#2255cc"/>'
  +'<ellipse cx="1" cy="33" rx="3" ry="1.8" fill="rgba(180,220,255,0.75)"/>'
  +'</svg>'
);
function buildTrail() {
  clearEntities();
  if(!pts.length) return;
  const n=pts.length, SEG=Math.max(2, Math.floor(n/100));
  for(let s=0;s<n-1;s+=SEG){
    const end=Math.min(s+SEG,n-1),positions=[];
    for(let i=s;i<=end;i++)
      positions.push(Cesium.Cartesian3.fromDegrees(pts[i].lon,pts[i].lat,pts[i].alt*zScale));
    const midIdx = Math.floor((s+end)/2);
    trailEntities.push(viewer.entities.add({
      polyline:{positions,width:trailW,
        material:new Cesium.ColorMaterialProperty(timeColor(midIdx)),
        clampToGround:false}
    }));
  }

  // 直近テール（白色・毎フレーム更新）
  const initTailPos = new Cesium.ConstantProperty(
    [Cesium.Cartesian3.fromDegrees(pts[0].lon, pts[0].lat, pts[0].alt*zScale),
     Cesium.Cartesian3.fromDegrees(pts[0].lon, pts[0].lat, pts[0].alt*zScale)]
  );
  tailEntity = viewer.entities.add({
    polyline:{
      positions: initTailPos,
      width: trailW + 1,
      material: new Cesium.ColorMaterialProperty(new Cesium.Color(1.0, 1.0, 1.0, 0.95)),
      clampToGround: false,
    }
  });
  markerStart=viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(pts[0].lon,pts[0].lat,pts[0].alt*zScale),
    point:{pixelSize:10,color:Cesium.Color.fromCssColorString('#00ff78'),outlineColor:Cesium.Color.WHITE,outlineWidth:2}
  });
  markerEnd=viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(pts[n-1].lon,pts[n-1].lat,pts[n-1].alt*zScale),
    point:{pixelSize:10,color:Cesium.Color.fromCssColorString('#ff3c3c'),outlineColor:Cesium.Color.WHITE,outlineWidth:2}
  });
  const p0=Cesium.Cartesian3.fromDegrees(pts[0].lon,pts[0].lat,pts[0].alt*zScale);
  aircraftEntity=viewer.entities.add({
    position:new Cesium.ConstantPositionProperty(p0),
    billboard:{image:ICON,width:96,height:60,
      verticalOrigin:Cesium.VerticalOrigin.CENTER,horizontalOrigin:Cesium.HorizontalOrigin.CENTER,
      disableDepthTestDistance:Number.POSITIVE_INFINITY},
    label:{text:Math.round(pts[0].alt)+' m',font:'bold 13px sans-serif',
      fillColor:Cesium.Color.fromCssColorString('#f5c842'),outlineColor:Cesium.Color.BLACK,outlineWidth:3,
      style:Cesium.LabelStyle.FILL_AND_OUTLINE,verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
      pixelOffset:new Cesium.Cartesian2(0,-36),disableDepthTestDistance:Number.POSITIVE_INFINITY}
  });
}
function updateAircraft() {
  if(!aircraftEntity||!pts.length) return;
  const cur=pts[headIdx()];
  const pos=Cesium.Cartesian3.fromDegrees(cur.lon,cur.lat,cur.alt*zScale);
  aircraftEntity.position.setValue(pos);
  aircraftEntity.label.text=Math.round(cur.alt)+' m';

  // 直近テール座標を更新
  if(tailEntity && hi > 0) {
    const curTime = cur.time;
    let tailStart = hi;
    for(let i=hi; i>=0; i--) {
      tailStart = i;
      if(pts[i].time <= curTime - TAIL_SEC) break;
    }
    const tailPositions = [];
    for(let i=tailStart; i<=hi; i++)
      tailPositions.push(Cesium.Cartesian3.fromDegrees(pts[i].lon, pts[i].lat, pts[i].alt*zScale));
    if(tailPositions.length >= 2)
      tailEntity.polyline.positions = new Cesium.ConstantProperty(tailPositions);
  }

  // カメラ高度に応じてアイコンサイズを動的に変更
  const camHeight = viewer.camera.positionCartographic.height;
  const minH=500, maxH=200000, minS=0.6, maxS=0.08;
  const t = Math.max(0, Math.min(1, (Math.log(camHeight) - Math.log(minH)) / (Math.log(maxH) - Math.log(minH))));
  aircraftEntity.billboard.scale = minS + (maxS - minS) * t;

  // 追従：記憶したheading/pitchを維持しながら機体位置に追従
  if(followMode) {
    viewer.camera.lookAt(
      pos,
      new Cesium.HeadingPitchRange(
        followHeading,
        followPitch,
        followDistance
      )
    );
  }
}

function toggleFollow() {
  followMode=!followMode;
  document.getElementById('bFol').classList.toggle('on',followMode);
  if(followMode) {
    // 追従ON時：現在のheading/pitchと距離を記憶
    followHeading = viewer.camera.heading;
    followPitch   = viewer.camera.pitch;
    viewer.trackedEntity = undefined;
    if(aircraftEntity&&pts.length) {
      const cur=pts[headIdx()];
      const pos=Cesium.Cartesian3.fromDegrees(cur.lon,cur.lat,cur.alt*zScale);
      followDistance = Cesium.Cartesian3.distance(viewer.camera.position, pos);
      followDistance = Math.max(3000, Math.min(followDistance, 50000));
    }
  } else {
    // 追従OFF：カメラロック解除
    viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
  }
}

// ── 再生
function togglePlay() {
  if(!pts.length) return;
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  if(playing){if(playhead>=1)playhead=0;prevTs=null;rafId=requestAnimationFrame(tick);}
  else{cancelAnimationFrame(rafId);rafId=null;}
}
function tick(ts) {
  if(!playing) return;
  if(prevTs!==null){const dt=(ts-prevTs)/1000;playhead=Math.min(1,playhead+(dt*+document.getElementById('speedSel').value)/totalDur());}
  prevTs=ts;frameCount++;
  const hi=headIdx();
  document.getElementById('pf').style.width=(playhead*100)+'%';
  document.getElementById('cT').textContent=fmtTime(pts[hi].time-pts[0].time);
  updateAircraft();updateHUD(hi);
  if(frameCount%30===0)drawAltChart();
  if(playhead>=1){playing=false;rafId=null;document.getElementById('playBtn').textContent='▶';drawAltChart();return;}
  rafId=requestAnimationFrame(tick);
}
function updateHUD(hi) {
  if(!pts.length) return;
  if(hi===undefined)hi=headIdx();
  const cur=pts[hi];
  document.getElementById('bAlt').textContent=Math.round(cur.alt)+' m';
  if(hi>0){
    const prev=pts[hi-1],dt=Math.max(0.1,cur.time-prev.time);
    const dm=haversineKm(prev.lat,prev.lon,cur.lat,cur.lon)*1000;
    document.getElementById('bSpd').textContent=(dm/dt*3.6).toFixed(1)+' km/h';
    const vario=(cur.alt-prev.alt)/dt,vEl=document.getElementById('bVar');
    vEl.textContent=(vario>=0?'+':'')+vario.toFixed(1)+' m/s';
    vEl.style.color=vario>0.5?'#00ff78':vario<-0.5?'#ff5555':'#f5c842';
  }
}
document.getElementById('pbar').addEventListener('click',e=>{
  if(!pts.length)return;
  const r=e.currentTarget.getBoundingClientRect();
  playhead=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const hi=headIdx();
  document.getElementById('pf').style.width=(playhead*100)+'%';
  document.getElementById('cT').textContent=fmtTime(pts[hi].time-pts[0].time);
  updateAircraft();drawAltChart();updateHUD(hi);
});

// ── 高度グラフ
function drawAltChart() {
  const c=document.getElementById('altCvs');
  if(!c.offsetWidth||!c.offsetHeight)return;
  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr;c.height=c.offsetHeight*dpr;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,p=3;
  ctx.clearRect(0,0,W,H);
  if(!pts.length)return;
  const n=pts.length,minA=bnds.minAlt,rng=Math.max(1,bnds.maxAlt-minA);
  const xOf=i=>p+(i/(n-1))*(W-p*2),yOf=a=>H-p-((a-minA)/rng)*(H-p*2);
  const grd=ctx.createLinearGradient(0,0,W,0);
  grd.addColorStop(0,'#00d4ff');grd.addColorStop(1,'#ff6b35');
  ctx.beginPath();ctx.moveTo(p,H-p);
  pts.forEach((d,i)=>i?ctx.lineTo(xOf(i),yOf(d.alt)):ctx.moveTo(xOf(i),yOf(d.alt)));
  ctx.lineTo(W-p,H-p);ctx.closePath();ctx.fillStyle='rgba(0,212,255,.1)';ctx.fill();
  ctx.beginPath();
  pts.forEach((d,i)=>i?ctx.lineTo(xOf(i),yOf(d.alt)):ctx.moveTo(xOf(i),yOf(d.alt)));
  ctx.strokeStyle=grd;ctx.lineWidth=1.5*dpr;ctx.stroke();
  const hx=xOf(headIdx());
  ctx.beginPath();ctx.moveTo(hx,0);ctx.lineTo(hx,H);
  ctx.strokeStyle='rgba(245,200,66,.9)';ctx.lineWidth=2*dpr;ctx.stroke();
}

// ── カメラ
function setZScale(v){zScale=v;document.getElementById('zvl').textContent='×'+v;if(pts.length){buildTrail();updateAircraft();}}
function setWidth(v){trailW=v;document.getElementById('wvl').textContent=v+'px';if(pts.length){buildTrail();updateAircraft();}}
function toggle3D(){is3D=!is3D;document.getElementById('b3d').classList.toggle('on',is3D);is3D?viewer.scene.morphTo3D(0.5):viewer.scene.morphTo2D(0.5);}
function fitAll(){
  if(!pts.length)return;
  viewer.camera.flyToBoundingSphere(
    Cesium.BoundingSphere.fromPoints(pts.map(p=>Cesium.Cartesian3.fromDegrees(p.lon,p.lat,p.alt*zScale))),
    {duration:1.5,offset:new Cesium.HeadingPitchRange(0,Cesium.Math.toRadians(-40),0)}
  );
}

// 追従中のホイールズームを followDistance に反映
viewer.scene.canvas.addEventListener('wheel', e => {
  if(!followMode) return;
  followDistance *= e.deltaY > 0 ? 1.15 : 0.87;
  followDistance = Math.max(3000, Math.min(followDistance, 100000));
}, { passive: true });

// ── データ読み込み
function loadFlightData(data) {
  if(!data||data.length<2){alert('有効なGPSデータが見つかりませんでした。');return;}
  playing=false;if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  pts=data.filter(d=>d.lat||d.lon);
  playhead=0;prevTs=null;frameCount=0;
  document.getElementById('playBtn').textContent='▶';
  bnds={minLat:Math.min(...pts.map(d=>d.lat)),maxLat:Math.max(...pts.map(d=>d.lat)),
    minLon:Math.min(...pts.map(d=>d.lon)),maxLon:Math.max(...pts.map(d=>d.lon)),
    minAlt:Math.min(...pts.map(d=>d.alt)),maxAlt:Math.max(...pts.map(d=>d.alt))};
  const dur=totalDur(),dist=totalDist(pts);
  document.getElementById('hA').textContent=Math.round(bnds.maxAlt);
  document.getElementById('hD').textContent=dist.toFixed(1);
  document.getElementById('hT').textContent=fmtTime(dur);
  document.getElementById('hstats').style.display='flex';
  document.getElementById('tT').textContent=fmtTime(dur);
  document.getElementById('cT').textContent='00:00:00';
  document.getElementById('pf').style.width='0%';
  document.getElementById('stc').innerHTML=`<div class="sgrid">
    <div class="sbox"><div class="bv">${Math.round(bnds.maxAlt)}</div><div class="bl">最高高度 m</div></div>
    <div class="sbox"><div class="bv">${Math.round(bnds.minAlt)}</div><div class="bl">最低高度 m</div></div>
    <div class="sbox"><div class="bv">${dist.toFixed(1)}</div><div class="bl">飛行距離 km</div></div>
    <div class="sbox"><div class="bv">${fmtTime(dur)}</div><div class="bl">飛行時間</div></div>
    <div class="sbox"><div class="bv">${(dist/(dur/3600)).toFixed(1)}</div><div class="bl">平均速度 km/h</div></div>
    <div class="sbox"><div class="bv">${pts.length}</div><div class="bl">GPS点数</div></div>
  </div>`;
  document.getElementById('hud').style.display='flex';
  buildTrail();updateAircraft();updateHUD(0);
  const ov=document.getElementById('ov');
  ov.style.opacity='0';ov.style.pointerEvents='none';
  setTimeout(()=>{ov.style.display='none';},420);
  setTimeout(()=>{fitAll();drawAltChart();},300);
}
function resetFlight() {
  playing=false;if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  clearEntities();pts=[];bnds=null;playhead=0;prevTs=null;frameCount=0;
  document.getElementById('hstats').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('pf').style.width='0%';
  document.getElementById('cT').textContent='00:00:00';
  document.getElementById('tT').textContent='00:00:00';
  document.getElementById('stc').innerHTML='<div style="font-size:11px;color:#5a7fa0;text-align:center;padding:4px 0">ファイルを読み込むと表示されます</div>';
  document.getElementById('altCvs').getContext('2d').clearRect(0,0,9999,9999);
  const ov=document.getElementById('ov');
  ov.style.display='flex';ov.style.opacity='1';ov.style.pointerEvents='';
}

document.getElementById('fi').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>loadFlightData(parseAuto(ev.target.result,f.name));
  r.readAsText(f);e.target.value='';
});
const dz=document.getElementById('dz');
document.body.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
document.body.addEventListener('dragleave',()=>dz.classList.remove('drag'));
document.body.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>loadFlightData(parseAuto(ev.target.result,f.name));
  r.readAsText(f);
});
function loadDemo(){loadFlightData(generateDemo());}
</script>
