<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARATRACK 3D — Motor Paraglider Flight Viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%AA%82</text></svg>">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#07101e;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; }

#map { position:absolute; inset:0; }

/* アイコン描画用Canvas（地図の上に重ねる） */
#iconCanvas {
  position:absolute; inset:0; z-index:5; pointer-events:none;
}

/* パネル共通 */
.panel {
  position:absolute; z-index:10;
  background:rgba(8,16,32,0.92); border:1px solid rgba(255,255,255,0.12);
  border-radius:11px; backdrop-filter:blur(16px); color:#d4e8f5;
}

/* ヘッダー */
#header {
  top:12px; left:12px; right:12px;
  display:flex; align-items:center; gap:12px; padding:9px 16px;
}
.logo { font-size:22px; }
.app-name { font-size:16px; font-weight:700; color:#f5c842; letter-spacing:.06em; }
.app-sub  { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.13em; margin-top:1px; }
#hstats { display:none; gap:14px; margin-left:auto; }
.hs .v { font-size:14px; font-weight:700; color:#f5c842; font-variant-numeric:tabular-nums; }
.hs .l { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.07em; }

/* 左パネル */
#side {
  position:absolute; z-index:10;
  left:12px; top:68px; bottom:12px;
  width:248px; display:flex; flex-direction:column; gap:8px;
}
.card {
  background:rgba(8,16,32,0.92); border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; padding:12px 14px; backdrop-filter:blur(16px); flex-shrink:0;
}
.card-grow { flex:1; min-height:0; display:flex; flex-direction:column; }
.sec {
  font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:#5a7fa0;
  margin-bottom:9px; display:flex; align-items:center; gap:5px;
}
.sec::before { content:''; width:9px; height:1px; background:#f5c842; display:block; flex-shrink:0; }

.lbtns { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.lbtn {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10);
  border-radius:6px; padding:7px 4px; color:#d4e8f5; font-size:10px;
  cursor:pointer; text-align:center; transition:all .14s; font-family:inherit;
}
.lbtn:hover { border-color:#f5c842; color:#f5c842; }
.lbtn.on    { background:rgba(245,200,66,.18); border-color:#f5c842; color:#f5c842; }

.prow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.pbtn {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#f59b1a,#f5c842); border:none; color:#07101e;
  font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform .1s;
}
.pbtn:hover { transform:scale(1.08); }
.ssel {
  flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10);
  border-radius:6px; color:#d4e8f5; font-size:11px; padding:6px 7px;
  outline:none; cursor:pointer; font-family:inherit;
}
.ssel option { background:#07101e; }
.pbar { width:100%; height:6px; background:rgba(255,255,255,.10);
  border-radius:3px; overflow:hidden; cursor:pointer; margin-bottom:5px; }
.pfill { height:100%; width:0%;
  background:linear-gradient(90deg,#00d4ff,#f5c842); border-radius:3px; }
.trow { display:flex; justify-content:space-between; font-size:10px; color:#5a7fa0; }
.tval { color:#d4e8f5; font-size:12px; font-variant-numeric:tabular-nums; }

.sg { margin-bottom:8px; }
.sr { display:flex; justify-content:space-between; margin-bottom:3px; }
.sl { font-size:10px; color:#5a7fa0; }
.sv { font-size:10px; color:#f5c842; font-weight:600; }
input[type=range] {
  -webkit-appearance:none; width:100%; height:4px; border-radius:2px;
  background:rgba(255,255,255,.12); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#f5c842;
}

.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.sbox { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  border-radius:7px; padding:8px 10px; }
.sbox .bv { font-size:15px; font-weight:700; color:#f5c842; line-height:1; font-variant-numeric:tabular-nums; }
.sbox .bl { font-size:8px; color:#5a7fa0; text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }

#altCvs { width:100%; flex:1; display:block; cursor:crosshair; min-height:40px; }
.legrow { display:flex; align-items:center; gap:5px; margin-top:5px; flex-shrink:0; }
.legbar { flex:1; height:3px; border-radius:2px; background:linear-gradient(90deg,#00d4ff,#ff6b35); }
.legl { font-size:9px; color:#5a7fa0; }
.newbtn {
  width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
  border-radius:6px; color:#5a7fa0; font-size:10px; padding:7px;
  cursor:pointer; margin-top:7px; font-family:inherit; flex-shrink:0; transition:all .14s;
}
.newbtn:hover { color:#f5c842; border-color:#f5c842; }

/* 右ボタン */
#rc {
  position:absolute; z-index:10; right:12px; top:68px;
  display:flex; flex-direction:column; gap:7px;
}
.cbtn {
  width:40px; height:40px; border-radius:9px;
  background:rgba(8,16,32,.92); border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(14px); color:#d4e8f5; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .14s;
}
.cbtn:hover,.cbtn.on { border-color:#f5c842; color:#f5c842; background:rgba(245,200,66,.15); }

/* HUD */
#hud {
  position:absolute; z-index:10;
  bottom:12px; left:272px; right:58px;
  display:none; align-items:center; gap:10px; padding:7px 14px;
}
.hl { font-size:9px; color:#5a7fa0; }
.hv { font-size:13px; font-weight:700; color:#f5c842; min-width:60px; font-variant-numeric:tabular-nums; }

/* アップロード */
#ov {
  position:absolute; inset:0; z-index:20;
  background:radial-gradient(ellipse at 50% 38%,#122040 0%,#060e1b 100%);
  display:flex; align-items:center; justify-content:center; padding:20px;
  transition:opacity .4s;
}
.ucard {
  background:rgba(9,18,36,.96); border:1.5px dashed rgba(245,200,66,.28);
  border-radius:18px; padding:44px 52px; text-align:center; max-width:460px; width:100%;
}
.ucard.drag { border-color:#f5c842; }
.uico   { font-size:52px; margin-bottom:14px; }
.utitle { font-size:22px; font-weight:700; color:#f5c842; margin-bottom:8px; letter-spacing:.05em; }
.udesc  { font-size:12px; color:#5a7fa0; line-height:1.7; margin-bottom:22px; }
.ubtn {
  width:100%; background:linear-gradient(135deg,#f59b1a,#f5c842); color:#07101e;
  border:none; border-radius:9px; padding:13px; font-size:14px; font-weight:700;
  cursor:pointer; margin-bottom:10px; font-family:inherit;
}
.ubtn:hover { filter:brightness(1.08); }
.dbtn {
  width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  border-radius:9px; color:#d4e8f5; font-size:12px; padding:11px;
  cursor:pointer; font-family:inherit; transition:all .14s;
}
.dbtn:hover { border-color:#f5c842; color:#f5c842; }
#fi { display:none; }
</style>
</head>
<body>

<div id="ov">
  <div class="ucard" id="dz">
    <div class="uico">🪂</div>
    <div class="utitle">PARATRACK 3D</div>
    <div class="udesc">IGC / GPX ファイルをドロップ、または選択して<br>3D衛星地図に飛行軌跡を表示します</div>
    <button class="ubtn" onclick="document.getElementById('fi').click()">📂 GPSログを選択</button>
    <input type="file" id="fi" accept=".igc,.idc,.gpx,.txt">
    <button class="dbtn" onclick="loadDemo()">🛫 デモフライト（富士山周辺）で試す</button>
  </div>
</div>

<div id="map"></div>
<canvas id="iconCanvas"></canvas>

<div class="panel" id="header">
  <div class="logo">🪂</div>
  <div><div class="app-name">PARATRACK 3D</div><div class="app-sub">Motor Paraglider Flight Viewer</div></div>
  <div id="hstats">
    <div class="hs"><div class="v" id="hA">—</div><div class="l">最高高度 m</div></div>
    <div class="hs"><div class="v" id="hD">—</div><div class="l">飛行距離 km</div></div>
    <div class="hs"><div class="v" id="hT">—</div><div class="l">飛行時間</div></div>
  </div>
</div>

<div id="side">
  <div class="card">
    <div class="sec">地図レイヤー</div>
    <div class="lbtns">
      <button class="lbtn on" id="lb-sat" onclick="setLayer('sat')">🛰 衛星写真</button>
      <button class="lbtn"    id="lb-osm" onclick="setLayer('osm')">🗺 地図</button>
      <button class="lbtn"    id="lb-gsi" onclick="setLayer('gsi')">🗾 地理院</button>
    </div>
  </div>
  <div class="card">
    <div class="sec">フライバック再生</div>
    <div class="prow">
      <button class="pbtn" id="playBtn" onclick="togglePlay()">▶</button>
      <select class="ssel" id="speedSel">
        <option value="1">× 1</option>
        <option value="5">× 5</option>
        <option value="10" selected>× 10</option>
        <option value="30">× 30</option>
        <option value="60">× 60</option>
        <option value="120">× 120</option>
      </select>
    </div>
    <div class="pbar" id="pbar"><div class="pfill" id="pf"></div></div>
    <div class="trow">
      <span class="tval" id="cT">00:00:00</span>
      <span class="tval" id="tT">00:00:00</span>
    </div>
  </div>
  <div class="card">
    <div class="sec">3D表示設定</div>
    <div class="sg">
      <div class="sr"><span class="sl">チルト角</span><span class="sv" id="tiltVl">50°</span></div>
      <input type="range" min="0" max="85" value="50" oninput="setTilt(+this.value)">
    </div>
    <div class="sg">
      <div class="sr"><span class="sl">テールの長さ</span><span class="sv" id="tailVl">60秒</span></div>
      <input type="range" min="10" max="300" value="60" step="10"
             oninput="tailSec=+this.value;document.getElementById('tailVl').textContent=this.value+'秒'">
    </div>
    <div class="sg">
      <div class="sr"><span class="sl">軌跡の太さ</span><span class="sv" id="wvl">4px</span></div>
      <input type="range" min="1" max="12" value="4" oninput="setWidth(+this.value)">
    </div>
  </div>
  <div class="card">
    <div class="sec">フライト統計</div>
    <div id="stc" style="font-size:11px;color:#5a7fa0;text-align:center;padding:4px 0">
      ファイルを読み込むと表示されます
    </div>
  </div>
  <div class="card card-grow">
    <div class="sec">高度グラフ</div>
    <canvas id="altCvs"></canvas>
    <div class="legrow"><span class="legl">低</span><div class="legbar"></div><span class="legl">高</span></div>
    <button class="newbtn" onclick="resetFlight()">↩ 別のフライトを読み込む</button>
  </div>
</div>

<div id="rc">
  <button class="cbtn"    id="bFol" onclick="toggleFollow()" title="機体追従">🎯</button>
  <button class="cbtn"              onclick="fitAll()"        title="全体表示">⛶</button>
  <button class="cbtn"              onclick="map.resetNorth()" title="北向きリセット">🧭</button>
</div>

<div class="panel" id="hud">
  <span class="hl">高度</span><span class="hv" id="bAlt">—</span>
  <span class="hl">|</span>
  <span class="hl">速度</span><span class="hv" id="bSpd">—</span>
  <span class="hl">|</span>
  <span class="hl">上昇率</span><span class="hv" id="bVar">—</span>
</div>

<script>
// ══════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════
function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  return [Math.floor(sec/3600), Math.floor((sec%3600)/60), sec%60]
    .map(v => String(v).padStart(2,'0')).join(':');
}
function haversineKm(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function totalDist(pts) {
  let d=0;
  for(let i=1;i<pts.length;i++) d+=haversineKm(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
  return d;
}
function altColor(alt, minAlt, maxAlt) {
  const t = Math.max(0, Math.min(1, (alt-minAlt)/Math.max(1,maxAlt-minAlt)));
  const r = Math.round(t*255);
  const g = Math.round(200-t*93);
  const b = Math.round(255-t*220);
  return [r,g,b];
}
function rgbHex(r,g,b) {
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════
// パーサー
// ══════════════════════════════════════════
function parseIGC(txt) {
  const pts=[];
  for(const line of txt.split(/\r?\n/)) {
    if(line[0]!=='B'||line.length<35) continue;
    const hh=+line.slice(1,3),mm=+line.slice(3,5),ss=+line.slice(5,7);
    const latD=+line.slice(7,9),latM=(+line.slice(9,11)+ +line.slice(11,14)/1000)/60;
    const lonD=+line.slice(15,18),lonM=(+line.slice(18,20)+ +line.slice(20,23)/1000)/60;
    let lat=latD+latM; if(line[14]==='S') lat=-lat;
    let lon=lonD+lonM; if(line[23]==='W') lon=-lon;
    const altG=+line.slice(30,35),altB=+line.slice(25,30);
    if(lat||lon) pts.push({lat,lon,alt:altG>0?altG:altB,time:hh*3600+mm*60+ss});
  }
  return pts;
}
function parseGPX(txt) {
  const pts=[];
  for(const m of txt.matchAll(/<trkpt\s+lat="([^"]+)"\s+lon="([^"]+)"[^>]*>([\s\S]*?)<\/trkpt>/g)) {
    const em=m[3].match(/<ele>([^<]+)/),tm=m[3].match(/<time>([^<]+)/);
    let time=0;
    if(tm){const d=new Date(tm[1]);time=d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
    pts.push({lat:+m[1],lon:+m[2],alt:em?+em[1]:0,time});
  }
  return pts;
}
function parseAuto(txt,name) {
  if(/\.gpx$/i.test(name)) return parseGPX(txt);
  const r=parseIGC(txt);
  return r.length>5?r:parseGPX(txt);
}
function generateDemo() {
  const pts=[],bLat=35.3606,bLon=138.7274;
  for(let i=0;i<=800;i++){
    const t=i/800,ang=t*5.5*Math.PI*2,r=0.014*(0.2+t*0.8);
    pts.push({
      lat:bLat+r*Math.sin(ang)+t*0.007,
      lon:bLon+r*Math.cos(ang)+t*0.009,
      alt:800+1100*Math.sin(t*Math.PI)+40*Math.sin(t*28)+Math.random()*18,
      time:i*4
    });
  }
  return pts;
}

// ══════════════════════════════════════════
// MapLibre GL JS 初期化
// ══════════════════════════════════════════
const TILE_URLS = {
  sat: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  osm: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  gsi: 'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
};

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'base-tiles': {
        type: 'raster',
        tiles: [TILE_URLS.sat],
        tileSize: 256,
        attribution: '© Esri',
      }
    },
    layers: [{
      id: 'base-layer',
      type: 'raster',
      source: 'base-tiles',
    }],
  },
  center: [138.7, 35.4],
  zoom: 9,
  pitch: 50,
  bearing: 0,
  attributionControl: true,
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

// 地図ロード後に軌跡レイヤーを追加
let mapLoaded = false;
map.on('load', () => {
  mapLoaded = true;

  // GeoJSONソース（軌跡用）
  map.addSource('full-trail', { type: 'geojson', data: emptyGeoJSON() });
  map.addSource('tail-trail', { type: 'geojson', data: emptyGeoJSON() });

  // 全ルート（薄い青線）
  map.addLayer({
    id: 'full-trail-layer',
    type: 'line',
    source: 'full-trail',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: {
      'line-color': '#4db8ff',
      'line-width': trailW * 0.7,
      'line-opacity': 0.6,
    }
  });

  // テール（高度で色変化する明るい線）
  map.addLayer({
    id: 'tail-trail-layer',
    type: 'line',
    source: 'tail-trail',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: {
      'line-color': ['get', 'color'],
      'line-width': trailW,
      'line-opacity': 1.0,
    }
  });

  // データがすでに読み込まれていたら描画
  if (pts.length > 0) renderMapLayers();
});

// 地図移動・ズーム時にアイコン再描画
map.on('move', drawIcon);
map.on('zoom', drawIcon);
map.on('rotate', drawIcon);
map.on('pitch', drawIcon);

function emptyGeoJSON() {
  return { type: 'FeatureCollection', features: [] };
}

// ══════════════════════════════════════════
// 地図レイヤー切替
// ══════════════════════════════════════════
function setLayer(id) {
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('lb-'+id).classList.add('on');
  map.getSource('base-tiles').setTiles([TILE_URLS[id]]);
}

// ══════════════════════════════════════════
// 状態
// ══════════════════════════════════════════
let pts=[], bnds=null;
let playhead=0, playing=false, rafId=null, prevTs=null;
let trailW=4, tailSec=60, followMode=false;
let frameCount=0;

function totalDur() { return pts.length<2?1:Math.max(1,pts[pts.length-1].time-pts[0].time); }
function headIdx()  { return Math.min(Math.floor(playhead*(pts.length-1)),pts.length-1); }

// ══════════════════════════════════════════
// 地図レイヤー描画
// ══════════════════════════════════════════
function renderMapLayers() {
  if (!mapLoaded || !pts.length) return;
  const hi = headIdx();

  // ── 全ルート（変化なし・一度だけ更新）
  // buildFlightData() から呼ばれる時だけ更新
  // ── テール（毎フレーム更新）
  updateTailLayer(hi);
}

function buildFullTrail() {
  if (!mapLoaded || !pts.length) return;
  const coords = pts.map(p => [p.lon, p.lat]);
  map.getSource('full-trail').setData({
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: coords }
    }]
  });
}

function updateTailLayer(hi) {
  if (!mapLoaded || !pts.length) return;
  const cur = pts[hi];

  // テール区間を探す
  let tailStart = 0;
  for (let i=hi; i>=0; i--) {
    tailStart = i;
    if (pts[i].time <= cur.time - tailSec) break;
  }

  // テールをセグメント単位でfeatureにして色をつける
  const features = [];
  for (let i=tailStart; i<hi; i++) {
    const [r,g,b] = altColor(pts[i].alt, bnds.minAlt, bnds.maxAlt);
    features.push({
      type: 'Feature',
      properties: { color: rgbHex(r,g,b) },
      geometry: {
        type: 'LineString',
        coordinates: [[pts[i].lon, pts[i].lat], [pts[i+1].lon, pts[i+1].lat]]
      }
    });
  }
  map.getSource('tail-trail').setData({ type:'FeatureCollection', features });
}

// ══════════════════════════════════════════
// アイコン Canvas（パラグライダーアイコン）
// ══════════════════════════════════════════
const iconCvs = document.getElementById('iconCanvas');
const iconCtx = iconCvs.getContext('2d');

function resizeIconCanvas() {
  iconCvs.width  = window.innerWidth;
  iconCvs.height = window.innerHeight;
}
window.addEventListener('resize', resizeIconCanvas);
resizeIconCanvas();

function drawIcon() {
  iconCtx.clearRect(0, 0, iconCvs.width, iconCvs.height);
  if (!pts.length) return;

  const hi  = headIdx();
  const cur = pts[hi];
  const pt  = map.project([cur.lon, cur.lat]);
  const px  = pt.x, py = pt.y;

  if (px < -60 || py < -60 || px > iconCvs.width+60 || py > iconCvs.height+60) return;

  // 進行方向
  let heading = 0;
  if (hi > 0) {
    const prev = pts[hi-1];
    const pp = map.project([prev.lon, prev.lat]);
    heading = Math.atan2(py - pp.y, px - pp.x) + Math.PI/2;
  }

  iconCtx.save();
  iconCtx.translate(px, py);
  iconCtx.rotate(heading);

  // ── 外側グロー（オレンジ）
  const grdOuter = iconCtx.createRadialGradient(0,0,8,0,0,44);
  grdOuter.addColorStop(0,'rgba(255,107,53,0.35)');
  grdOuter.addColorStop(1,'rgba(255,107,53,0)');
  iconCtx.beginPath(); iconCtx.arc(0,0,44,0,Math.PI*2);
  iconCtx.fillStyle=grdOuter; iconCtx.fill();

  // ── 内側グロー（レッド）
  const grdInner = iconCtx.createRadialGradient(0,0,4,0,0,28);
  grdInner.addColorStop(0,'rgba(192,57,43,0.5)');
  grdInner.addColorStop(1,'rgba(192,57,43,0)');
  iconCtx.beginPath(); iconCtx.arc(0,0,28,0,Math.PI*2);
  iconCtx.fillStyle=grdInner; iconCtx.fill();

  const S = 1.9;
  iconCtx.scale(S, S);

  // ── キャノピー（グラデーション塗り）
  const canopyGrd = iconCtx.createLinearGradient(0,-24,0,0);
  canopyGrd.addColorStop(0,'rgba(255,255,255,0.85)');
  canopyGrd.addColorStop(0.5,'rgba(255,107,53,0.9)');
  canopyGrd.addColorStop(1,'rgba(192,57,43,0.95)');
  iconCtx.beginPath();
  iconCtx.moveTo(-20,0);
  iconCtx.quadraticCurveTo(-15,-22,0,-24);
  iconCtx.quadraticCurveTo(15,-22,20,0);
  iconCtx.closePath();
  iconCtx.fillStyle=canopyGrd; iconCtx.fill();
  iconCtx.strokeStyle='rgba(255,107,53,0.8)'; iconCtx.lineWidth=1.2; iconCtx.stroke();

  // ── キャノピー内部リブ（縦線）
  iconCtx.strokeStyle='rgba(255,255,255,0.3)'; iconCtx.lineWidth=0.7;
  [[-12,-1,-10,-21],[-5,-2,-4,-23],[5,-2,4,-23],[12,-1,10,-21]].forEach(([x1,y1,x2,y2])=>{
    iconCtx.beginPath(); iconCtx.moveTo(x1,y1); iconCtx.lineTo(x2,y2); iconCtx.stroke();
  });

  // ── サスペンションライン
  iconCtx.strokeStyle='rgba(255,140,66,0.9)'; iconCtx.lineWidth=0.9;
  [[-15,0],[-7,-2],[0,-2],[7,-2],[15,0]].forEach(([lx,ly])=>{
    iconCtx.beginPath(); iconCtx.moveTo(lx,ly); iconCtx.lineTo(0,14); iconCtx.stroke();
  });

  // ── ハーネス
  const harnessGrd = iconCtx.createLinearGradient(-6,12,6,22);
  harnessGrd.addColorStop(0,'#7a1c10');
  harnessGrd.addColorStop(1,'#4a0e08');
  const hx=-6,hy=12,hw=12,hh=10,hr=3;
  iconCtx.beginPath();
  iconCtx.moveTo(hx+hr,hy);
  iconCtx.lineTo(hx+hw-hr,hy); iconCtx.arcTo(hx+hw,hy,hx+hw,hy+hr,hr);
  iconCtx.lineTo(hx+hw,hy+hh-hr); iconCtx.arcTo(hx+hw,hy+hh,hx+hw-hr,hy+hh,hr);
  iconCtx.lineTo(hx+hr,hy+hh); iconCtx.arcTo(hx,hy+hh,hx,hy+hh-hr,hr);
  iconCtx.lineTo(hx,hy+hr); iconCtx.arcTo(hx,hy,hx+hr,hy,hr);
  iconCtx.closePath();
  iconCtx.fillStyle=harnessGrd; iconCtx.fill();
  iconCtx.strokeStyle='rgba(255,107,53,0.7)'; iconCtx.lineWidth=0.8; iconCtx.stroke();

  // ── パイロット（胴体）
  const bodyGrd = iconCtx.createRadialGradient(0,19,1,0,19,7);
  bodyGrd.addColorStop(0,'#c0390f');
  bodyGrd.addColorStop(1,'#7a1c10');
  iconCtx.beginPath(); iconCtx.ellipse(0,19,6,5,0,0,Math.PI*2);
  iconCtx.fillStyle=bodyGrd; iconCtx.fill();

  // ── パイロット（ヘルメット）
  const helmGrd = iconCtx.createRadialGradient(-1,10,0,-1,10,4);
  helmGrd.addColorStop(0,'#ff6b35');
  helmGrd.addColorStop(1,'#c0390f');
  iconCtx.beginPath(); iconCtx.arc(0,10,4,0,Math.PI*2);
  iconCtx.fillStyle=helmGrd; iconCtx.fill();
  iconCtx.strokeStyle='rgba(255,140,66,0.6)'; iconCtx.lineWidth=0.6; iconCtx.stroke();

  // ── バイザー（シールド）
  iconCtx.beginPath(); iconCtx.ellipse(0,11,2.5,1.8,0,0,Math.PI*2);
  iconCtx.fillStyle='rgba(100,200,255,0.6)'; iconCtx.fill();

  // ── モーターフレーム（円形）
  iconCtx.beginPath(); iconCtx.arc(0,21,11,0,Math.PI*2);
  iconCtx.strokeStyle='rgba(255,107,53,0.5)'; iconCtx.lineWidth=1.2;
  iconCtx.setLineDash([2,2]); iconCtx.stroke(); iconCtx.setLineDash([]);

  // ── プロペラ（十字）
  iconCtx.save(); iconCtx.translate(0,21);
  const propGrd1 = iconCtx.createLinearGradient(0,-9,0,9);
  propGrd1.addColorStop(0,'rgba(255,107,53,0.9)');
  propGrd1.addColorStop(1,'rgba(192,57,43,0.9)');
  // 縦ブレード
  iconCtx.beginPath(); iconCtx.ellipse(0,0,2,9,0,0,Math.PI*2);
  iconCtx.fillStyle=propGrd1; iconCtx.fill();
  // 横ブレード
  iconCtx.beginPath(); iconCtx.ellipse(0,0,9,2,0,0,Math.PI*2);
  iconCtx.fillStyle=propGrd1; iconCtx.fill();
  // 中心ナット
  iconCtx.beginPath(); iconCtx.arc(0,0,2,0,Math.PI*2);
  iconCtx.fillStyle='#ff8c42'; iconCtx.fill();
  iconCtx.restore();

  iconCtx.restore();

  // ── 高度ラベル（回転なし・スクリーン座標で描画）
  iconCtx.save();
  iconCtx.font='bold 13px sans-serif';
  iconCtx.textAlign='center';
  iconCtx.shadowColor='rgba(0,0,0,0.9)'; iconCtx.shadowBlur=5;
  iconCtx.fillStyle='#ff8c42';
  iconCtx.fillText(Math.round(cur.alt)+' m', px, py - 50);
  iconCtx.restore();
}

// ══════════════════════════════════════════
// 毎フレーム更新
// ══════════════════════════════════════════
function updateFrame() {
  if (!pts.length) return;
  const hi = headIdx();
  updateTailLayer(hi);
  drawIcon();
  if (followMode) {
    const cur = pts[hi];
    map.easeTo({ center: [cur.lon, cur.lat], duration: 200, easing: t => t });
  }
}

// ══════════════════════════════════════════
// 再生
// ══════════════════════════════════════════
function togglePlay() {
  if (!pts.length) return;
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
  if (playing) {
    if (playhead >= 1) playhead = 0;
    prevTs = null;
    rafId = requestAnimationFrame(tick);
  } else {
    cancelAnimationFrame(rafId); rafId = null;
  }
}

function tick(ts) {
  if (!playing) return;
  if (prevTs !== null) {
    const dt = (ts - prevTs) / 1000;
    playhead = Math.min(1, playhead + (dt * +document.getElementById('speedSel').value) / totalDur());
  }
  prevTs = ts;
  frameCount++;

  const hi = headIdx();
  document.getElementById('pf').style.width = (playhead*100)+'%';
  document.getElementById('cT').textContent = fmtTime(pts[hi].time - pts[0].time);

  updateFrame();
  updateHUD(hi);
  if (frameCount % 30 === 0) drawAltChart();

  if (playhead >= 1) {
    playing = false; rafId = null;
    document.getElementById('playBtn').textContent = '▶';
    drawAltChart();
    return;
  }
  rafId = requestAnimationFrame(tick);
}

function updateHUD(hi) {
  if (!pts.length) return;
  if (hi === undefined) hi = headIdx();
  const cur = pts[hi];
  document.getElementById('bAlt').textContent = Math.round(cur.alt)+' m';
  if (hi > 0) {
    const prev = pts[hi-1];
    const dt = Math.max(0.1, cur.time-prev.time);
    const dm = haversineKm(prev.lat,prev.lon,cur.lat,cur.lon)*1000;
    document.getElementById('bSpd').textContent = (dm/dt*3.6).toFixed(1)+' km/h';
    const vario = (cur.alt-prev.alt)/dt;
    const vEl = document.getElementById('bVar');
    vEl.textContent = (vario>=0?'+':'')+vario.toFixed(1)+' m/s';
    vEl.style.color = vario>0.5?'#00ff78':vario<-0.5?'#ff5555':'#f5c842';
  }
}

document.getElementById('pbar').addEventListener('click', e => {
  if (!pts.length) return;
  const r = e.currentTarget.getBoundingClientRect();
  playhead = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  const hi = headIdx();
  document.getElementById('pf').style.width = (playhead*100)+'%';
  document.getElementById('cT').textContent = fmtTime(pts[hi].time - pts[0].time);
  updateFrame(); drawAltChart(); updateHUD(hi);
});

// ══════════════════════════════════════════
// 高度グラフ
// ══════════════════════════════════════════
function drawAltChart() {
  const c = document.getElementById('altCvs');
  if (!c.offsetWidth || !c.offsetHeight) return;
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth*dpr; c.height = c.offsetHeight*dpr;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height, p=3;
  ctx.clearRect(0,0,W,H);
  if (!pts.length) return;
  const n=pts.length, minA=bnds.minAlt, rng=Math.max(1,bnds.maxAlt-minA);
  const xOf = i => p+(i/(n-1))*(W-p*2);
  const yOf = a => H-p-((a-minA)/rng)*(H-p*2);
  const grd = ctx.createLinearGradient(0,0,W,0);
  grd.addColorStop(0,'#00d4ff'); grd.addColorStop(1,'#ff6b35');
  ctx.beginPath(); ctx.moveTo(p,H-p);
  pts.forEach((d,i) => i ? ctx.lineTo(xOf(i),yOf(d.alt)) : ctx.moveTo(xOf(i),yOf(d.alt)));
  ctx.lineTo(W-p,H-p); ctx.closePath();
  ctx.fillStyle='rgba(0,212,255,.1)'; ctx.fill();
  ctx.beginPath();
  pts.forEach((d,i) => i ? ctx.lineTo(xOf(i),yOf(d.alt)) : ctx.moveTo(xOf(i),yOf(d.alt)));
  ctx.strokeStyle=grd; ctx.lineWidth=1.5*dpr; ctx.stroke();
  const hx = xOf(headIdx());
  ctx.beginPath(); ctx.moveTo(hx,0); ctx.lineTo(hx,H);
  ctx.strokeStyle='rgba(245,200,66,.9)'; ctx.lineWidth=2*dpr; ctx.stroke();
}

// ══════════════════════════════════════════
// カメラ・設定
// ══════════════════════════════════════════
function setTilt(v) {
  document.getElementById('tiltVl').textContent = v+'°';
  map.setPitch(v);
}
function setWidth(v) {
  trailW = v;
  document.getElementById('wvl').textContent = v+'px';
  if (mapLoaded) {
    map.setPaintProperty('full-trail-layer', 'line-width', Math.max(2, v*0.7));
    map.setPaintProperty('tail-trail-layer', 'line-width', v);
  }
}
function toggleFollow() {
  followMode = !followMode;
  document.getElementById('bFol').classList.toggle('on', followMode);
}
function fitAll() {
  if (!pts.length) return;
  const lats = pts.map(p=>p.lat), lons = pts.map(p=>p.lon);
  map.fitBounds(
    [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
    { padding: 60, duration: 1000 }
  );
}

// ══════════════════════════════════════════
// データ読み込み
// ══════════════════════════════════════════
function loadFlightData(data) {
  if (!data || data.length < 2) { alert('有効なGPSデータが見つかりませんでした。'); return; }
  playing = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  pts = data.filter(d => d.lat || d.lon);
  playhead = 0; prevTs = null; frameCount = 0;
  document.getElementById('playBtn').textContent = '▶';

  bnds = {
    minLat: Math.min(...pts.map(d=>d.lat)), maxLat: Math.max(...pts.map(d=>d.lat)),
    minLon: Math.min(...pts.map(d=>d.lon)), maxLon: Math.max(...pts.map(d=>d.lon)),
    minAlt: Math.min(...pts.map(d=>d.alt)), maxAlt: Math.max(...pts.map(d=>d.alt)),
  };

  const dur = totalDur(), dist = totalDist(pts);
  document.getElementById('hA').textContent = Math.round(bnds.maxAlt);
  document.getElementById('hD').textContent = dist.toFixed(1);
  document.getElementById('hT').textContent = fmtTime(dur);
  document.getElementById('hstats').style.display = 'flex';
  document.getElementById('tT').textContent = fmtTime(dur);
  document.getElementById('cT').textContent = '00:00:00';
  document.getElementById('pf').style.width = '0%';
  document.getElementById('stc').innerHTML = `<div class="sgrid">
    <div class="sbox"><div class="bv">${Math.round(bnds.maxAlt)}</div><div class="bl">最高高度 m</div></div>
    <div class="sbox"><div class="bv">${Math.round(bnds.minAlt)}</div><div class="bl">最低高度 m</div></div>
    <div class="sbox"><div class="bv">${dist.toFixed(1)}</div><div class="bl">飛行距離 km</div></div>
    <div class="sbox"><div class="bv">${fmtTime(dur)}</div><div class="bl">飛行時間</div></div>
    <div class="sbox"><div class="bv">${(dist/(dur/3600)).toFixed(1)}</div><div class="bl">平均速度 km/h</div></div>
    <div class="sbox"><div class="bv">${pts.length}</div><div class="bl">GPS点数</div></div>
  </div>`;
  document.getElementById('hud').style.display = 'flex';

  // アップロード画面を隠す
  const ov = document.getElementById('ov');
  ov.style.opacity = '0'; ov.style.pointerEvents = 'none';
  setTimeout(() => { ov.style.display = 'none'; }, 420);

  // 地図が読み込み済みならすぐ描画、未読み込みなら load イベントで描画
  buildFullTrail();
  updateFrame();
  updateHUD(0);

  // カメラをフライトエリアに移動
  const centerLat = (bnds.minLat+bnds.maxLat)/2;
  const centerLon = (bnds.minLon+bnds.maxLon)/2;
  map.flyTo({ center:[centerLon, centerLat], zoom:11, pitch:50, duration:1500 });

  setTimeout(() => { fitAll(); drawAltChart(); }, 300);
}

function resetFlight() {
  playing = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  pts = []; bnds = null; playhead = 0; prevTs = null; frameCount = 0;
  iconCtx.clearRect(0, 0, iconCvs.width, iconCvs.height);
  if (mapLoaded) {
    map.getSource('full-trail').setData(emptyGeoJSON());
    map.getSource('tail-trail').setData(emptyGeoJSON());
  }
  document.getElementById('hstats').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('pf').style.width = '0%';
  document.getElementById('cT').textContent = '00:00:00';
  document.getElementById('tT').textContent = '00:00:00';
  document.getElementById('stc').innerHTML = '<div style="font-size:11px;color:#5a7fa0;text-align:center;padding:4px 0">ファイルを読み込むと表示されます</div>';
  document.getElementById('altCvs').getContext('2d').clearRect(0,0,9999,9999);
  const ov = document.getElementById('ov');
  ov.style.display='flex'; ov.style.opacity='1'; ov.style.pointerEvents='';
}

// ファイル入力
document.getElementById('fi').addEventListener('change', e => {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>loadFlightData(parseAuto(ev.target.result,f.name));
  r.readAsText(f); e.target.value='';
});
const dz=document.getElementById('dz');
document.body.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
document.body.addEventListener('dragleave',()=>dz.classList.remove('drag'));
document.body.addEventListener('drop',e=>{
  e.preventDefault(); dz.classList.remove('drag');
  const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>loadFlightData(parseAuto(ev.target.result,f.name));
  r.readAsText(f);
});
function loadDemo(){ loadFlightData(generateDemo()); }
</script>
