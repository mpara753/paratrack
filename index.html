<script>
// ── IGC補正ライブラリ（igcCorrection.js インライン展開）
(function(global){
function parseBRecord(line){
  if(!line.startsWith('B')||line.length<35)return null;
  try{
    const hh=parseInt(line.slice(1,3),10),mm=parseInt(line.slice(3,5),10),ss=parseInt(line.slice(5,7),10);
    const latDeg=parseInt(line.slice(7,9),10),latMin=parseInt(line.slice(9,11),10),latMinDec=parseInt(line.slice(11,14),10),latHemi=line[14];
    const lonDeg=parseInt(line.slice(15,18),10),lonMin=parseInt(line.slice(18,20),10),lonMinDec=parseInt(line.slice(20,23),10),lonHemi=line[23];
    let lat=latDeg+(latMin+latMinDec/1000)/60; if(latHemi==='S')lat=-lat;
    let lon=lonDeg+(lonMin+lonMinDec/1000)/60; if(lonHemi==='W')lon=-lon;
    const validity=line[24],altP=parseInt(line.slice(25,30),10),altG=parseInt(line.slice(30,35),10);
    return{timeSec:hh*3600+mm*60+ss,hh,mm,ss,lat,lon,validity,altP,altG,raw:line};
  }catch(e){return null;}
}
function latToIGC(lat){
  const hemi=lat>=0?'N':'S'; lat=Math.abs(lat);
  const deg=Math.floor(lat),minFull=(lat-deg)*60,min=Math.floor(minFull);
  let minDec=Math.round((minFull-min)*1000); if(minDec>=1000)minDec=999;
  return`${String(deg).padStart(2,'0')}${String(min).padStart(2,'0')}${String(minDec).padStart(3,'0')}${hemi}`;
}
function lonToIGC(lon){
  const hemi=lon>=0?'E':'W'; lon=Math.abs(lon);
  const deg=Math.floor(lon),minFull=(lon-deg)*60,min=Math.floor(minFull);
  let minDec=Math.round((minFull-min)*1000); if(minDec>=1000)minDec=999;
  return`${String(deg).padStart(3,'0')}${String(min).padStart(2,'0')}${String(minDec).padStart(3,'0')}${hemi}`;
}
function buildBRecord(point,lat,lon,altP,altG){
  const tail=point.raw.slice(35);
  return'B'+String(point.hh).padStart(2,'0')+String(point.mm).padStart(2,'0')+String(point.ss).padStart(2,'0')
    +latToIGC(lat)+lonToIGC(lon)+point.validity
    +String(Math.round(altP)).padStart(5,'0')+String(Math.round(altG)).padStart(5,'0')+tail;
}
function detectAltAnomalyRanges(points,threshold=3){
  const n=points.length,anomaly=new Array(n).fill(false);
  for(let i=1;i<n;i++){
    // altP（気圧高度）を補正対象とする
    const dag=points[i].altP-points[i-1].altP;
    if(dag>=threshold){
      anomaly[i]=true;
      const ref=points[i-1].altP;
      for(let j=i+1;j<Math.min(i+60,n);j++){
        if(points[j].altP>ref+2)anomaly[j]=true; else break;
      }
    }
  }
  const ranges=[]; let i=0;
  while(i<n){
    if(anomaly[i]){
      const start=i; while(i<n&&anomaly[i])i++; const end=i-1;
      const prevIdx=start-1,nextIdx=end+1;
      if(prevIdx>=0&&nextIdx<n)ranges.push({start,end,prevIdx,nextIdx});
    }else i++;
  }
  return ranges;
}
function correctAltitude(points,threshold=3){
  const ranges=detectAltAnomalyRanges(points,threshold); let fixedCount=0;
  for(const{start,end,prevIdx,nextIdx}of ranges){
    const pPrev=points[prevIdx],pNext=points[nextIdx],t0=pPrev.timeSec,t2=pNext.timeSec;
    for(let bi=start;bi<=end;bi++){
      const p=points[bi],ratio=(t2>t0)?(p.timeSec-t0)/(t2-t0):0.5;
      // altP（気圧高度）を補正
      p.altP=Math.round(pPrev.altP+ratio*(pNext.altP-pPrev.altP));
      p.altG=Math.round(pPrev.altG+ratio*(pNext.altG-pPrev.altG));
      fixedCount++;
    }
  }
  return{fixedCount,ranges};
}
function buildNaturalCubicSpline(x,y){
  const n=x.length-1,h=new Array(n);
  for(let i=0;i<n;i++)h[i]=x[i+1]-x[i];
  const alpha=new Array(n-1);
  for(let i=1;i<n;i++)alpha[i-1]=(3/h[i])*(y[i+1]-y[i])-(3/h[i-1])*(y[i]-y[i-1]);
  const l=new Array(n+1).fill(0),mu=new Array(n+1).fill(0),z=new Array(n+1).fill(0);
  l[0]=1;
  for(let i=1;i<n;i++){l[i]=2*(x[i+1]-x[i-1])-h[i-1]*mu[i-1];mu[i]=h[i]/l[i];z[i]=(alpha[i-1]-h[i-1]*z[i-1])/l[i];}
  l[n]=1;
  const c=new Array(n+1).fill(0),b=new Array(n),d=new Array(n);
  for(let j=n-1;j>=0;j--){c[j]=z[j]-mu[j]*c[j+1];b[j]=(y[j+1]-y[j])/h[j]-h[j]*(c[j+1]+2*c[j])/3;d[j]=(c[j+1]-c[j])/(3*h[j]);}
  const segments=[];
  for(let j=0;j<n;j++)segments.push({xj:x[j],a:y[j],b:b[j],c:c[j],d:d[j]});
  return segments;
}
function evalSpline(segments,xKnots,xVal){
  let lo=0,hi=segments.length-1;
  while(lo<hi-1){const mid=(lo+hi)>>1;if(xKnots[mid+1]<=xVal)lo=mid+1;else hi=mid;}
  const seg=segments[lo],dx=xVal-seg.xj;
  return seg.a+seg.b*dx+seg.c*dx*dx+seg.d*dx*dx*dx;
}
function smoothingSpline(t,vals,w=3){
  const n=vals.length;
  if(n<4) return vals.slice(); // 点数が少ない場合はそのまま返す
  const half=Math.floor(w/2),smoothed=vals.slice();
  for(let i=half;i<n-half;i++){let sum=0;for(let j=-half;j<=half;j++)sum+=vals[i+j];smoothed[i]=sum/w;}
  const step=3,knotIdx=[];
  for(let i=0;i<n;i+=step)knotIdx.push(i);
  if(knotIdx[knotIdx.length-1]!==n-1)knotIdx.push(n-1);
  if(knotIdx.length<3) return smoothed; // ノット点が少ない場合は移動平均結果を返す
  const knotT=knotIdx.map(i=>t[i]),knotV=knotIdx.map(i=>smoothed[i]);
  // 重複するtを除去（スプラインの前提条件：単調増加）
  const uniqT=[], uniqV=[];
  for(let i=0;i<knotT.length;i++){
    if(i===0||knotT[i]>knotT[i-1]){uniqT.push(knotT[i]);uniqV.push(knotV[i]);}
  }
  if(uniqT.length<3) return smoothed;
  const segments=buildNaturalCubicSpline(uniqT,uniqV);
  const result=new Array(n);
  for(let i=0;i<n;i++){
    const v=evalSpline(segments,uniqT,t[i]);
    result[i]=isFinite(v)?v:smoothed[i]; // NaNの場合は移動平均値を使用
  }
  return result;
}
function correctCoordinates(points,w=3){
  const t=points.map(p=>p.timeSec-points[0].timeSec),lats=points.map(p=>p.lat),lons=points.map(p=>p.lon);
  const newLats=smoothingSpline(t,lats,w),newLons=smoothingSpline(t,lons,w);
  let ssLat=0,ssLon=0;
  for(let i=0;i<points.length;i++){
    const dLat=(newLats[i]-lats[i])*111000,dLon=(newLons[i]-lons[i])*91000;
    ssLat+=dLat*dLat;ssLon+=dLon*dLon;
    points[i].lat=newLats[i];points[i].lon=newLons[i];
  }
  return{rmsLat:Math.sqrt(ssLat/points.length),rmsLon:Math.sqrt(ssLon/points.length)};
}
function correctIGC(igcText,options={}){
  const{fixAltitude=true,fixCoordinates=true,altThreshold=3,smoothWindow=3}=options;
  const eol=igcText.includes('\r\n')?'\r\n':'\n',lines=igcText.split(/\r?\n/);
  const bLineIndices=[],points=[];
  for(let i=0;i<lines.length;i++){const p=parseBRecord(lines[i]);if(p){bLineIndices.push(i);points.push(p);}}
  if(points.length===0)return{text:igcText,log:{error:'Bレコードが見つかりません'}};
  const log={totalPoints:points.length,altitudeFixedCount:0,altitudeRanges:[],coordinateRmsLat:0,coordinateRmsLon:0};
  if(fixAltitude){const{fixedCount,ranges}=correctAltitude(points,altThreshold);log.altitudeFixedCount=fixedCount;log.altitudeRanges=ranges;}
  if(fixCoordinates){const{rmsLat,rmsLon}=correctCoordinates(points,smoothWindow);log.coordinateRmsLat=rmsLat;log.coordinateRmsLon=rmsLon;}
  const outLines=lines.slice();
  for(let i=0;i<points.length;i++){const p=points[i];outLines[bLineIndices[i]]=buildBRecord(p,p.lat,p.lon,p.altP,p.altG);}
  return{text:outLines.join(eol),log};
}
global.IGCCorrection={correctIGC,correctAltitude,correctCoordinates};

function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  return [Math.floor(sec/3600), Math.floor((sec%3600)/60), sec%60]
    .map(v => String(v).padStart(2,'0')).join(':');

function haversineKm(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function totalDist(pts) {
  let d=0;
  for(let i=1;i<pts.length;i++) d+=haversineKm(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
  return d;
}

function timeColor(ptIndex) {
  const startTime = pts[0].time;
  const totalTime = pts[pts.length-1].time - startTime;
  const elapsed   = pts[ptIndex].time - startTime;
  const t = elapsed / Math.max(1, totalTime);

  return TRAIL_COLORS[colorIdx];
}

// ── パーサー
function parseIGC(txt) {
  const pts=[];
  for(const line of txt.split(/\r?\n/)) {
    if(line[0]!=='B'||line.length<35) continue;
    const hh=+line.slice(1,3),mm=+line.slice(3,5),ss=+line.slice(5,7);
    const latD=+line.slice(7,9),latM=(+line.slice(9,11)+ +line.slice(11,14)/1000)/60;
    const lonD=+line.slice(15,18),lonM=(+line.slice(18,20)+ +line.slice(20,23)/1000)/60;
    let lat=latD+latM; if(line[14]==='S') lat=-lat;
    let lon=lonD+lonM; if(line[23]==='W') lon=-lon;
    const altG=+line.slice(30,35),altB=+line.slice(25,30);
    let alt = altB>0 ? altB : altG;
    if(!isFinite(alt)) alt = 0;
    if(lat||lon) pts.push({lat,lon,alt,time:hh*3600+mm*60+ss});
  }
  return pts;
}
function parseGPX(txt) {
  const pts=[];
  for(const m of txt.matchAll(/<trkpt\s+lat="([^"]+)"\s+lon="([^"]+)"[^>]*>([\s\S]*?)<\/trkpt>/g)) {
    const em=m[3].match(/<ele>([^<]+)/),tm=m[3].match(/<time>([^<]+)/);
    let time=0;
    if(tm){const d=new Date(tm[1]);time=d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
    pts.push({lat:+m[1],lon:+m[2],alt:em?+em[1]:0,time});
  }
  return pts;
}
function parseIGCDate(txt) {
  // HFDTE または HFDTEDATE レコードから日付を取得
  const m = txt.match(/HFDTE(?:DATE:)?(\d{2})(\d{2})(\d{2})/);
  if(!m) return null;
  const dd=m[1],mm=m[2],yy=m[3];
  const year = 2000 + parseInt(yy);
  return `${year}年${parseInt(mm)}月${parseInt(dd)}日`;
}

function parseAuto(txt,name) {
  if(/\.gpx$/i.test(name)) return parseGPX(txt);
  let igcTxt = txt;
  try {
    // 2段階補正：1回目は強めに（離着陸対応）、2回目は弱めに（飛行中の精度維持）
    const result1 = IGCCorrection.correctIGC(txt, {
      fixAltitude: true,
      fixCoordinates: true,
      altThreshold: 2,
      smoothWindow: 15,
    });
    const result = IGCCorrection.correctIGC(result1.text, {
      fixAltitude: false,
      fixCoordinates: true,
      altThreshold: 2,
      smoothWindow: 5,
    });
    const testPts = parseIGC(result.text);
    // altがNaNの点はalt=0として扱う（高度0は有効）
    const badPts = testPts.filter(p =>
      !isFinite(p.lat) || !isFinite(p.lon) ||
      p.lat < -90 || p.lat > 90 || p.lon < -180 || p.lon > 180
    );
    if(badPts.length === 0) {
      igcTxt = result.text;
      const log = result.log;
      console.log('✅ IGC補正完了');
      console.log('  総GPS点数:', log.totalPoints);
      console.log('  高度補正点数:', log.altitudeFixedCount);
      console.log('  座標RMS(lat):', log.coordinateRmsLat?.toFixed(4), 'm');
      console.log('  座標RMS(lon):', log.coordinateRmsLon?.toFixed(4), 'm');
    } else {
      console.warn('⚠️ 不正座標が', badPts.length, '点検出 → 補正なしで読み込み');
      console.warn('  不正座標例:', badPts.slice(0,3));
      // 座標補正なしで高度補正のみ再試行
      const result2 = IGCCorrection.correctIGC(txt, {
        fixAltitude: true,
        fixCoordinates: false,
        altThreshold: 3,
      });
      const testPts2 = parseIGC(result2.text);
      const bad2 = testPts2.filter(p => !isFinite(p.lat)||!isFinite(p.lon)||!isFinite(p.alt));
      if(bad2.length === 0) {
        igcTxt = result2.text;
        console.log('✅ 高度補正のみ適用');
      }
    }
  } catch(e) {
    console.warn('⚠️ IGC補正エラー:', e);
  }
  const r=parseIGC(igcTxt);
  return r.length>5?r:parseGPX(txt);
}

function buildGmapTrail() {
  if(!gmap || !pts.length) return;
  // 既存の軌跡を削除
  gmapPolylines.forEach(p => p.setMap(null));
  gmapPolylines = [];
  if(gmapMarker) { gmapMarker.setMap(null); gmapMarker = null; }

  const n = pts.length;
  const NUM_SEG = 20;
  const SEG = Math.max(2, Math.ceil(n / NUM_SEG));

  const gmapColors = [
    '#ff0033','#ff3300','#ff6600','#ff9900','#ffcc00',
    '#ffff00','#b3ff00','#66ff00','#00ff00','#00ff66',
    '#00ffb3','#00ffff','#00b3ff','#0066ff','#0000ff',
    '#4d00ff','#9900ff','#cc00ff','#ff00cc','#ff0080',
  ];

  for(let s=0; s<n-1; s+=SEG) {
    const end = Math.min(s+SEG, n-1);
    const path = [];
    for(let i=s; i<=end; i++)
      path.push({lat: pts[i].lat, lng: pts[i].lon});
    const midIdx = Math.floor((s+end)/2);
    const t = Math.min(Math.floor((midIdx/(n-1))*20), 19);
    const poly = new google.maps.Polyline({
      path, strokeColor: gmapColors[t], strokeWeight: 3, strokeOpacity: 1.0, map: gmap
    });
    gmapPolylines.push(poly);
  }

  // 機体マーカー
  gmapMarker = new google.maps.Marker({
    position: {lat: pts[0].lat, lng: pts[0].lon},
    map: gmap,
    icon: {
      path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
      scale: 5, fillColor:'#f5c842', fillOpacity:1,
      strokeColor:'#333', strokeWeight:1,
    }
  });

  // 地図の中心を軌跡に合わせる
  const bounds = new google.maps.LatLngBounds();
  pts.forEach(p => bounds.extend({lat:p.lat, lng:p.lon}));
  gmap.fitBounds(bounds);
}

function buildTrail() {
  clearEntities();
  if(!pts.length) return;
  const n=pts.length;
  // セグメント数を最大20に固定（20色分け）
  const NUM_SEG = 20;
  const SEG = Math.max(2, Math.ceil(n / NUM_SEG));
  for(let s=0;s<n-1;s+=SEG){
    const end=Math.min(s+SEG,n-1), positions=[];
    for(let i=s;i<=end;i++)
      positions.push(Cesium.Cartesian3.fromDegrees(pts[i].lon,pts[i].lat,pts[i].alt*zScale));
    const midIdx=Math.floor((s+end)/2);
    trailEntities.push(viewer.entities.add({
      polyline:{positions,width:trailW,
        material:new Cesium.ColorMaterialProperty(timeColor(midIdx)),
        clampToGround:false}
    }));
  }
  // スタート/エンドマーカーは非表示
  markerStart = null;
  markerEnd = null;
  // 機体アイコン
  const p0=Cesium.Cartesian3.fromDegrees(pts[0].lon,pts[0].lat,pts[0].alt*zScale);
  aircraftEntity=viewer.entities.add({
    position:new Cesium.ConstantPositionProperty(p0),
    billboard:{image:ICON,width:96,height:60,
      verticalOrigin:Cesium.VerticalOrigin.CENTER,horizontalOrigin:Cesium.HorizontalOrigin.CENTER,
      disableDepthTestDistance:Number.POSITIVE_INFINITY},
    label:{text:Math.round(pts[0].alt)+' m',font:'bold 13px sans-serif',
      fillColor:Cesium.Color.fromCssColorString('#f5c842'),outlineColor:Cesium.Color.BLACK,outlineWidth:3,
      style:Cesium.LabelStyle.FILL_AND_OUTLINE,verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
      pixelOffset:new Cesium.Cartesian2(0,-36),disableDepthTestDistance:Number.POSITIVE_INFINITY}
  });
}

function updateAircraft() {
  if(!aircraftEntity||!pts.length) return;
  const hi=headIdx();
  const cur=pts[hi];
  const pos=Cesium.Cartesian3.fromDegrees(cur.lon,cur.lat,cur.alt*zScale);
  aircraftEntity.position.setValue(pos);
  aircraftEntity.label.text=Math.round(cur.alt)+' m';
  // テール更新
  // アイコンスケール
  const camHeight=viewer.camera.positionCartographic.height;
  const minH=500,maxH=200000,minS=0.6,maxS=0.08;
  const t=Math.max(0,Math.min(1,(Math.log(camHeight)-Math.log(minH))/(Math.log(maxH)-Math.log(minH))));
  aircraftEntity.billboard.scale=minS+(maxS-minS)*t;
  // 追従
  if(followMode){
    viewer.camera.lookAt(pos,new Cesium.HeadingPitchRange(followHeading,followPitch,followDistance));
  }
}

function toggleFollow() {

      followDistance=Cesium.Cartesian3.distance(viewer.camera.position,pos);
      followDistance=Math.max(200,Math.min(followDistance,50000));
    }
  } else {
    viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
  }
}

function togglePlay() {

  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';

  else{cancelAnimationFrame(rafId);rafId=null;}
}
function tick(ts) {
  if(!playing) return;
  if(prevTs!==null){
    const dt=(ts-prevTs)/1000;
    playhead=Math.min(1,playhead+(dt*+document.getElementById('speedSel').value)/totalDur());
  }
  prevTs=ts; frameCount++;
  const hi=headIdx();
  document.getElementById('pf').style.width=(playhead*100)+'%';
  document.getElementById('cT').textContent=fmtTime(pts[hi].time-pts[0].time);
  updateAircraft(); updateHUD(hi);
  if(mapEngine==='gmap') updateGmapMarker();
  if(frameCount%30===0) drawAltChart();
  if(playhead>=1){playing=false;rafId=null;document.getElementById('playBtn').textContent='▶';drawAltChart();return;}
  rafId=requestAnimationFrame(tick);
}
function updateHUD(hi) {
  if(!pts.length) return;
  if(hi===undefined) hi=headIdx();
  const cur=pts[hi];
  document.getElementById('bAlt').textContent=Math.round(cur.alt)+' m';
  if(hi>0){
    const prev=pts[hi-1],dt=Math.max(0.1,cur.time-prev.time);
    const dm=haversineKm(prev.lat,prev.lon,cur.lat,cur.lon)*1000;
    document.getElementById('bSpd').textContent=(dm/dt*3.6).toFixed(1)+' km/h';
    const vario=(cur.alt-prev.alt)/dt,vEl=document.getElementById('bVar');
    vEl.textContent=(vario>=0?'+':'')+vario.toFixed(1)+' m/s';
    vEl.style.color=vario>0.5?'#00ff78':vario<-0.5?'#ff5555':'#f5c842';
  }
}

  const c=document.getElementById('altCvs');
  if(!c.offsetWidth||!c.offsetHeight) return;
  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr; c.height=c.offsetHeight*dpr;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,p=3;
  ctx.clearRect(0,0,W,H);
  if(!pts.length) return;
  const n=pts.length,minA=bnds.minAlt,rng=Math.max(1,bnds.maxAlt-minA);
  const xOf=i=>p+(i/(n-1))*(W-p*2), yOf=a=>H-p-((a-minA)/rng)*(H-p*2);

  // 目盛りの単位を決定（グラフ内に3〜6本が収まるよう自動調整）
  const steps=[5,10,20,50,100,200,500,1000];
  let step=50;
  for(const s of steps){
    if(rng/s <= 6){ step=s; break; }
  }
  const leftPad=32*dpr; // 目盛りラベル用の左余白

  // 塗りつぶし
  ctx.beginPath(); ctx.moveTo(leftPad,H-p);
  pts.forEach((d,i)=>i?ctx.lineTo(leftPad+(i/(n-1))*(W-leftPad-p),yOf(d.alt)):ctx.moveTo(leftPad,yOf(d.alt)));
  ctx.lineTo(W-p,H-p); ctx.closePath();
  ctx.fillStyle='rgba(0,212,255,.08)'; ctx.fill();

  // 目盛り線とラベル
  const firstTick = Math.ceil(minA/step)*step;
  ctx.font=`${9*dpr}px sans-serif`;
  ctx.textAlign='right';
  ctx.textBaseline='middle';
  for(let alt=firstTick; alt<=bnds.maxAlt; alt+=step){
    const y=yOf(alt);
    if(y<p || y>H-p) continue;
    // グリッド線
    ctx.beginPath(); ctx.moveTo(leftPad,y); ctx.lineTo(W-p,y);
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1*dpr; ctx.stroke();
    // ラベル
    ctx.fillStyle='rgba(160,200,220,0.7)';
    ctx.fillText(alt+'m', leftPad-3*dpr, y);
  }

  // 折れ線を20色セグメントで描画
  const totalTime=pts[n-1].time-pts[0].time;
  const gmColors=[
    '#ff0033','#ff3300','#ff6600','#ff9900','#ffcc00',
    '#ffff00','#b3ff00','#66ff00','#00ff00','#00ff66',
    '#00ffb3','#00ffff','#00b3ff','#0066ff','#0000ff',
    '#4d00ff','#9900ff','#cc00ff','#ff00cc','#ff0080',
  ];
  const xOfL=i=>leftPad+(i/(n-1))*(W-leftPad-p);
  for(let i=1;i<n;i++){
    const t=Math.max(0,Math.min(1,(pts[i].time-pts[0].time)/Math.max(1,totalTime)));
    const ci=Math.min(Math.floor(t*20),19);
    ctx.beginPath();
    ctx.moveTo(xOfL(i-1),yOf(pts[i-1].alt));
    ctx.lineTo(xOfL(i),yOf(pts[i].alt));
    ctx.strokeStyle=gmColors[ci];
    ctx.lineWidth=1.5*dpr; ctx.stroke();
  }

  // 現在位置の縦線
  const hx=xOfL(headIdx());
  ctx.beginPath(); ctx.moveTo(hx,0); ctx.lineTo(hx,H);
  ctx.strokeStyle='rgba(245,200,66,.9)'; ctx.lineWidth=2*dpr; ctx.stroke();
}

// ── カメラ操作
function setWidth(v){trailW=v;document.getElementById('wvl').textContent=v+'px';if(pts.length){buildTrail();updateAircraft();}}
function toggle3D(){is3D=!is3D;document.getElementById('b3d').classList.toggle('on',is3D);is3D?viewer.scene.morphTo3D(0.5):viewer.scene.morphTo2D(0.5);}
function togglePanel(){
  const side=document.getElementById('side');
  const header=document.getElementById('header');
  const hud=document.getElementById('hud');
  const btn=document.getElementById('bPanel');
  const hidden=side.style.display==='none';
  side.style.display=hidden?'flex':'none';
  header.style.display=hidden?'flex':'none';
  if(!hidden) hud.style.left='12px';
  else hud.style.left='272px';
  btn.classList.toggle('on',hidden);
}
function fitAll(){
  if(!pts.length) return;
  viewer.camera.flyToBoundingSphere(
    Cesium.BoundingSphere.fromPoints(pts.map(p=>Cesium.Cartesian3.fromDegrees(p.lon,p.lat,p.alt*zScale))),
    {duration:1.5,offset:new Cesium.HeadingPitchRange(0,Cesium.Math.toRadians(-40),0)}
  );
}

// ホイールズーム（追従中）
viewer.scene.canvas.addEventListener('wheel',e=>{
  if(!followMode) return;
  e.preventDefault();
  followDistance*=e.deltaY>0?1.2:0.8;
  followDistance=Math.max(50,Math.min(followDistance,100000));
  // 即座に反映
  if(aircraftEntity&&pts.length){
    const cur=pts[headIdx()];
    const pos=Cesium.Cartesian3.fromDegrees(cur.lon,cur.lat,cur.alt*zScale);
    viewer.camera.lookAt(pos,new Cesium.HeadingPitchRange(followHeading,followPitch,followDistance));
  }
},{passive:false});

// ── データ読み込み
function loadFlightData(data) {
  if(!data||data.length<2){alert('有効なGPSデータが見つかりませんでした。');return;}
  playing=false; if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  pts=data.filter(d=>d.lat||d.lon);
  playhead=0; prevTs=null; frameCount=0;
  document.getElementById('playBtn').textContent='▶';
  bnds={
    minLat:Math.min(...pts.map(d=>d.lat)),maxLat:Math.max(...pts.map(d=>d.lat)),
    minLon:Math.min(...pts.map(d=>d.lon)),maxLon:Math.max(...pts.map(d=>d.lon)),
    minAlt:Math.min(...pts.map(d=>d.alt)),maxAlt:Math.max(...pts.map(d=>d.alt)),
  };
  const dur=totalDur(), dist=totalDist(pts);
  document.getElementById('hA').textContent=Math.round(bnds.maxAlt);
  document.getElementById('hD').textContent=dist.toFixed(1);
  document.getElementById('hT').textContent=fmtTime(dur);
  document.getElementById('hstats').style.display='flex';
  document.getElementById('tT').textContent=fmtTime(dur);
  document.getElementById('cT').textContent='00:00:00';
  document.getElementById('pf').style.width='0%';
  document.getElementById('stc').innerHTML=`<div class="sgrid">
    <div class="sbox"><div class="bv">${Math.round(bnds.maxAlt)}</div><div class="bl">最高高度 m</div></div>
    <div class="sbox"><div class="bv">${Math.round(bnds.minAlt)}</div><div class="bl">最低高度 m</div></div>
    <div class="sbox"><div class="bv">${dist.toFixed(1)}</div><div class="bl">飛行距離 km</div></div>
    <div class="sbox"><div class="bv">${fmtTime(dur)}</div><div class="bl">飛行時間</div></div>
    <div class="sbox"><div class="bv">${(dist/(dur/3600)).toFixed(1)}</div><div class="bl">平均速度 km/h</div></div>
    <div class="sbox"><div class="bv">${pts.length}</div><div class="bl">GPS点数</div></div>
  </div>`;
  document.getElementById('hud').style.display='flex';

  // ファイル情報をヘッダーに表示
  const fi = document.getElementById('fileInfo');
  if(fi) {
    const toJST = sec => ((sec + 9*3600) % 86400);
    const startJST = toJST(pts[0].time);
    const endJST   = toJST(pts[pts.length-1].time);
    const startHH = String(Math.floor(startJST/3600)).padStart(2,'0');
    const startMM = String(Math.floor((startJST%3600)/60)).padStart(2,'0');
    const endHH   = String(Math.floor(endJST/3600)).padStart(2,'0');
    const endMM   = String(Math.floor((endJST%3600)/60)).padStart(2,'0');
    document.getElementById('fName').textContent = currentFileName || '—';
    document.getElementById('fDate').textContent = currentFileDate || '—';
    document.getElementById('fTime').textContent = `${startHH}:${startMM} ～ ${endHH}:${endMM}`;
    fi.style.display = 'flex';
  }
  // Google Analytics イベント記録
  if(typeof gtag !== 'undefined') {
    gtag('event', 'load_flight', {
      'file_name': currentFileName,
      'gps_points': pts.length,
      'flight_date': currentFileDate,
      'max_altitude': Math.round(bnds.maxAlt),
      'distance_km': dist.toFixed(1),
    });
  }

  buildTrail(); updateAircraft(); updateHUD(0);
  if(mapEngine==='gmap') buildGmapTrail();
  const ov=document.getElementById('ov');
  ov.style.opacity='0'; ov.style.pointerEvents='none';
  setTimeout(()=>{ov.style.display='none';},420);
  setTimeout(()=>{fitAll();drawAltChart();},300);
}

function resetFlight() {
  playing=false; if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  clearEntities();
  pts=[]; bnds=null; playhead=0; prevTs=null; frameCount=0;
  document.getElementById('hstats').style.display='none';
  document.getElementById('hud').style.display='none';
  const fi=document.getElementById('fileInfo'); if(fi) fi.style.display='none';
  document.getElementById('pf').style.width='0%';
  document.getElementById('cT').textContent='00:00:00';
  document.getElementById('tT').textContent='00:00:00';
  document.getElementById('stc').innerHTML='<div style="font-size:11px;color:#5a7fa0;text-align:center;padding:4px 0">ファイルを読み込むと表示されます</div>';
  document.getElementById('altCvs').getContext('2d').clearRect(0,0,9999,9999);
  const ov=document.getElementById('ov');
  ov.style.display='flex'; ov.style.opacity='1'; ov.style.pointerEvents='';
}

document.getElementById('fi').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  currentFileName = f.name;
  const r=new FileReader();
  r.onload=ev=>{
    currentFileDate = /\.igc$/i.test(f.name) ? (parseIGCDate(ev.target.result)||'') : '';
    loadFlightData(parseAuto(ev.target.result,f.name));
  };
  r.readAsText(f); e.target.value='';
});
const dz=document.getElementById('dz');
document.body.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
document.body.addEventListener('dragleave',()=>dz.classList.remove('drag'));
document.body.addEventListener('drop',e=>{
  e.preventDefault(); dz.classList.remove('drag');
  const f=e.dataTransfer.files[0]; if(!f) return;
  currentFileName = f.name;
  const r=new FileReader();
  r.onload=ev=>{
    currentFileDate = /\.igc$/i.test(f.name) ? (parseIGCDate(ev.target.result)||'') : '';
    loadFlightData(parseAuto(ev.target.result,f.name));
  };
  r.readAsText(f);
});
function loadDemo(){loadFlightData(generateDemo());}
</script>
